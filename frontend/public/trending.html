<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CookSmart - Trending</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login-modal.css">
  <script src="script.js" defer></script>
  <script src="login-modal.js" defer></script>

 
  
  
  <style>
    /* Hamburger Button */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  z-index: 1001;
}

.hamburger span {
  display: block;
  width: 25px;
  height: 3px;
  background: #764ba2;
  border-radius: 3px;
  transition: all 0.3s ease;
}

/* Hamburger animation when open */
.hamburger.open span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 6px);
}
.hamburger.open span:nth-child(2) {
  opacity: 0;
}
.hamburger.open span:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -6px);
}

/* Mobile styles */
@media (max-width: 768px) {
  .hamburger {
    display: flex; /* ✅ show on mobile */
  }

  .navbar-menu {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 70px;
    left: 0;
    right: 0;
    background: white;
    padding: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    z-index: 1000;
    gap: 8px;
  }

  .navbar-menu.open {
    display: flex; /* ✅ show menu when open */
  }

  .navbar-menu li {
    width: 100%;
    text-align: center;
  }

  .navbar-menu li a {
    display: block;
    padding: 12px;
    border-radius: 8px;
    font-size: 1rem;
    color: #333;
    transition: background 0.2s;
  }

  .navbar-menu li a:hover {
    background: #f3f0fa;
    color: #764ba2;
  }

  /* Make sure navbar is relative for absolute menu */
  .navbar {
    position: relative;
  }
}
    .trending-section {
      background: var(--card-bg, #f8fafc);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 22px rgba(10,10,10,0.06);
      margin-top: 32px;
    }
    .trending-section h3 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.5rem;
      color: #764ba2;
      font-weight: 800;
    }
    .trending-recipes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    .trending-item {
      background: white;
      border-radius: 12px;
      box-shadow: 0 6px 14px rgba(10,10,10,0.08);
      text-align: center;
      overflow: hidden;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .trending-item:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 12px 28px rgba(102,126,234,0.12);
    }
    .trending-photo {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
      display: block;
    }
    .trending-content {
      padding: 18px 12px 12px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }
    .trending-number {
      background: linear-gradient(45deg,#667eea,#764ba2);
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(102,126,234,0.12);
    }
    .trending-item h5 {
      margin: 0 0 6px 0;
      font-size: 1.08rem;
      font-weight: 700;
      color: #764ba2;
    }
    .trending-item p {
      margin: 0;
      color: #667eea;
      font-size: 0.98rem;
    }
    @media (max-width:900px){
      .trending-recipes {
        grid-template-columns: repeat(2, 1fr);
      }
      .trending-item{min-height:180px;}
      .trending-photo{height:110px;}
    }
    @media (max-width:600px){
      .trending-recipes {
        grid-template-columns: 1fr;
      }
      .trending-section { padding: 10px; }
    }

    /* Modal Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      overflow-y: auto;
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }
    .modal-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Modal Content */
    .modal-content {
      background: white;
      border-radius: 16px;
      max-width: 700px;
      width: 100%;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      position: relative;
      animation: slideUp 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
    }

    /* Close Button */
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: #f1f5f9;
      color: #334155;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      z-index: 10;
    }
    .modal-close:hover {
      background: #e2e8f0;
      transform: rotate(90deg);
    }

    /* Modal Recipe Image */
    .modal-recipe-image {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    /* Modal Recipe Details */
    .modal-recipe-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: #764ba2;
      margin: 0 0 12px 0;
    }

    .modal-recipe-description {
      color: #4a5568;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    
    .modal-details-row {
      display: flex;
      gap: 16px;
      margin: 16px 0;
      flex-wrap: wrap;
    }

    .modal-detail-item {
      flex: 1;
      min-width: 150px;
      padding: 12px;
      background: #f8fafc;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      text-align: center;
    }

    .modal-detail-item strong {
      display: block;
      color: #2d3748;
      font-weight: 700;
      margin-bottom: 4px;
      font-size: 0.9rem;
    }

    .modal-detail-item span {
      color: #4a5568;
      font-size: 1rem;
    }
    
    /* Ingredients section - full width */
    .modal-ingredients-section {
      margin: 16px 0;
      padding: 12px;
      background: #f8fafc;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .modal-ingredients-section strong {
      color: #2d3748;
      font-weight: 700;
      display: block;
      margin-bottom: 6px;
    }

    .modal-ingredients-section span {
      color: #4a5568;
    }

    /* Nutrition Dropdown Button */
    .modal-nutrition-dropdown {
      margin-top: 16px;
      max-width: 280px;
    }

    .nutrition-dropdown-btn {
      width: 100%;
      padding: 10px 16px;
      background: #edf2ff;
      border: 2px solid #c7d2fe;
      border-radius: 10px;
      color: #4c51bf;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s ease;
    }

    .nutrition-dropdown-btn:hover {
      background: #dbeafe;
      border-color: #93c5fd;
    }

    .nutrition-dropdown-btn .arrow {
      font-size: 1rem;
      transition: transform 0.3s ease;
    }

    .nutrition-dropdown-btn.active .arrow {
      transform: rotate(180deg);
    }

    /* Nutrition Content (Initially Hidden) */
    .modal-nutrition-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      padding: 0 12px;
      background: #edf2ff;
      border: 2px solid #c7d2fe;
      border-top: none;
      border-radius: 0 0 10px 10px;
    }

    .modal-nutrition-content.show {
      max-height: 400px;
      padding: 12px;
      overflow-y: auto;
    }

    .modal-nutrition-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .modal-nutrition-list li {
      padding: 6px 0;
      color: #4a5568;
      font-size: 0.85rem;
      border-bottom: 1px dashed #cbd5e0;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .modal-nutrition-list li:last-child {
      border-bottom: none;
    }

    .modal-nutrition-list li strong {
      font-weight: 600;
      color: #2d3748;
      font-size: 0.85rem;
    }

    /* Watch Recipe Link in Modal */
    .modal-youtube-link {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 24px;
      background: #e46060;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(255,0,0,0.3);
    }

    .modal-youtube-link:hover {
      background: #cc0000;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255,0,0,0.4);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { 
        opacity: 0;
        transform: translateY(30px);
      }
      to { 
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width:900px){
      .modal-content {
        padding: 16px;
        max-height: 95vh;
      }
      .modal-recipe-image {
        height: 200px;
      }
      .modal-recipe-title {
        font-size: 1.4rem;
      }
    }
     
  </style>
</head>
<body class="bg-discover">
  <!-- Navbar -->
 <nav class="navbar">
<div class="navbar-container">
  <a href="index.html" class="navbar-brand">
    <img src="images/logo.jpg" alt="Logo" style="height:60px; width:200px; border-radius:8%; margin-right:0.5rem; object-fit:cover; vertical-align:middle;">
  </a>

  <!-- ✅ Hamburger button -->
  <button class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <ul class="navbar-menu" id="navbar-menu">
       <li><a href="index.html">Home</a></li>
    <li><a href="discover.html" onclick="return LoginModal.requireLogin(event)">Discover</a></li>
    <li><a href="trending.html" class="active">Trending</a></li>
    <li><a href="about.html" onclick="return LoginModal.requireLogin(event)">About</a></li>
  </ul>
</div>
</nav>

  <div class="container">
    <section class="trending-section" id="trending">
      <h3>🔥 Trending This Week</h3>
      <div class="trending-recipes" id="trendingRecipes">
        <!-- Recipes will be loaded dynamically -->
      </div>
    </section>
  </div>

  <!-- Modal for Recipe Details -->
  <div id="recipeModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modalRecipeContent"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 CookSmart. Made with ❤️</p>
  </footer>

  <script>
    const API = "/api";

    // State variables
    let trendingRecipes = [];

    // Fetch Trending Recipes
    async function fetchTrendingRecipes() {
      try {
        const res = await fetch(`${API}/recipes/trending`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        trendingRecipes = data;
        renderTrendingRecipes(data);
      } catch (err) {
        console.error("Error fetching trending recipes:", err);
        const container = document.getElementById("trendingRecipes");
        container.innerHTML = `
          <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #667eea;">
            <div style="font-size: 2rem; margin-bottom: 10px;">😕</div>
            <h4>Error loading trending recipes</h4>
            <p>${err.message}</p>
          </div>`;
      }
    }

    // Render Trending Recipes
    function renderTrendingRecipes(recipes) {
      const container = document.getElementById("trendingRecipes");

      if (!Array.isArray(recipes) || recipes.length === 0) {
        container.innerHTML = `
          <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #667eea;">
            <div style="font-size: 2rem; margin-bottom: 10px;">🔍</div>
            <h4>No trending recipes found</h4>
            <p>Check back later for this week's trending recipes!</p>
          </div>`;
        return;
      }

      container.innerHTML = recipes.map((recipe, index) => {
        const imageFile = recipe.image || recipe.imageUrl;
        const imageUrl = imageFile ? (imageFile.startsWith('http') ? imageFile : `images/${imageFile}`) : null;

        const timeVal = recipe.cookingTime || recipe.time;
        const timeDisplay = timeVal ? `${timeVal} min` : "N/A";

        return `
        <div class="trending-item" onclick="openRecipeModal(${index})" style="cursor: pointer;">
          ${imageUrl ? `
            <img src="${imageUrl}" class="trending-photo" alt="${recipe.name || recipe.title || 'Recipe'}" 
                 onerror="this.style.display='none';">
          ` : ""}
          <div class="trending-content">
            <div class="trending-number">${index + 1}</div>
            <h5>${recipe.name || recipe.title || "Untitled Recipe"}</h5>
            <p>${recipe.rating ? `${recipe.rating} ⭐` : "⭐ N/A"} • ${recipe.likes || 0} likes</p>
          </div>
        </div>
        `;
      }).join("");
    }

    // Open Modal with Recipe Details
    async function openRecipeModal(index) {
      const recipe = trendingRecipes[index];
      if (!recipe) return;

      // Track the view
      try {
        await fetch(`${API}/recipes/${recipe._id || recipe.id}/view`, { method: 'POST' });
      } catch (err) {
        console.warn("Could not track view:", err);
      }

      const imageFile = recipe.image || recipe.imageUrl;
      const imageUrl = imageFile ? (imageFile.startsWith('http') ? imageFile : `images/${imageFile}`) : null;

      const timeVal = recipe.cookingTime || recipe.time;
      const timeDisplay = timeVal ? `${timeVal} min` : "N/A";

      let nutritionHtml = "";
      if (recipe.nutrition && typeof recipe.nutrition === "object") {
        const items = Object.entries(recipe.nutrition)
          .map(([key, value]) => `<li><strong>${capitalize(key)}:</strong> ${value}</li>`)
          .join("");

        if (items) {
          nutritionHtml = `
            <div class="modal-nutrition-dropdown">
              <button class="nutrition-dropdown-btn" onclick="toggleNutrition(event)">
                <span>Nutrition</span>
                <span class="arrow">▼</span>
              </button>
              <div class="modal-nutrition-content">
                <ul class="modal-nutrition-list">
                  ${items}
                </ul>
              </div>
            </div>
          `;
        }
      }

      const ingredientsText = Array.isArray(recipe.ingredients) ? recipe.ingredients.join(", ") : String(recipe.ingredients || "");

      const modalContent = `
        ${imageUrl ? `
          <img src="${imageUrl}" alt="${recipe.name || recipe.title || 'Recipe'}" class="modal-recipe-image" 
               onerror="this.style.display='none';">
        ` : ""}

        <h2 class="modal-recipe-title">${recipe.name || recipe.title || "Untitled Recipe"}</h2>
        
        <p class="modal-recipe-description">${recipe.description || "No description available."}</p>

        <div class="modal-ingredients-section">
          <strong>Ingredients:</strong> 
          <span>${ingredientsText}</span>
        </div>

        <div class="modal-details-row">
         <div class="modal-detail-item">
           <strong>Time</strong>
           <span>${timeDisplay}</span>
         </div>

         <div class="modal-detail-item">
           <strong>Difficulty</strong>
           <span>${recipe.difficulty || "Unknown"}</span>
         </div>

         <div class="modal-detail-item">
           <strong>Rating</strong>
           <span>⭐ ${recipe.rating || "N/A"}</span>
         </div>
        </div>

        <a href="https://www.youtube.com/results?search_query=${encodeURIComponent((recipe.name || recipe.title || 'recipe') + ' recipe')}" 
           target="_blank" rel="noopener noreferrer" class="modal-youtube-link">
          🎥 Watch Recipe on YouTube
        </a>
 <a href="https://www.google.com/search?q=${encodeURIComponent((recipe.name || recipe.title || 'recipe') + ' recipe')}" 
     target="_blank" 
     rel="noopener noreferrer" 
     class="modal-youtube-link"
     style="margin-top:0; background:#4285f4; box-shadow:0 4px 12px rgba(66,133,244,0.3);">
    🔍 Search on Google
  </a>
        ${nutritionHtml}
      `;

      document.getElementById("modalRecipeContent").innerHTML = modalContent;
      document.getElementById("recipeModal").classList.add("active");
      document.body.style.overflow = "hidden";
    }

    // Close Modal
    function closeModal() {
      document.getElementById("recipeModal").classList.remove("active");
      document.body.style.overflow = "auto";
    }

    // Close modal when clicking on overlay
    function closeModalOnOverlay(event) {
      if (event.target.id === "recipeModal") {
        closeModal();
      }
    }

    // Close modal with Escape key
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        closeModal();
      }
    });

    // Utility functions
    function capitalize(str) {
      const s = String(str);
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function toggleNutrition(event) {
      event.preventDefault();
      const btn = event.currentTarget;
      const content = btn.nextElementSibling;
      
      btn.classList.toggle('active');
      content.classList.toggle('show');
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', fetchTrendingRecipes);
  </script>

  <script>
function toggleMenu() {
  const menu = document.getElementById('navbar-menu');
  const hamburger = document.getElementById('hamburger');
  menu.classList.toggle('open');
  hamburger.classList.toggle('open');
}

// Close menu when clicking outside
document.addEventListener('click', function(e) {
  const menu = document.getElementById('navbar-menu');
  const hamburger = document.getElementById('hamburger');
  if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
    menu.classList.remove('open');
    hamburger.classList.remove('open');
  }
});

// Close menu when a link is clicked
document.querySelectorAll('.navbar-menu a').forEach(link => {
  link.addEventListener('click', () => {
    document.getElementById('navbar-menu').classList.remove('open');
    document.getElementById('hamburger').classList.remove('open');
  });
});
</script>
</body>
</html>
