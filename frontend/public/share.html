<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CookSmart - Share Recipe</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login-modal.css">
  <script src="script.js" defer></script>
  <script src="login-modal.js" defer></script>

  <!-- Custom Language Selector -->
  <style>
    .floating-lang-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      z-index: 1000;
    }
    .lang-popup {
      position: fixed;
      bottom: 90px;
      right: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 10px;
      z-index: 1001;
      display: flex;
      flex-direction: column;
    }
    .lang-popup button {
      margin: 5px 0;
      padding: 8px 16px;
      border: none;
      background: #764ba2;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    .lang-popup button:hover {
      background: #667eea;
    }
  </style>
  <script>
    function toggleLangPopup() {
      var popup = document.getElementById('lang-popup');
      popup.style.display = popup.style.display === 'none' ? 'block' : 'none';
    }
    function setLanguage(lang) {
      var url = 'https://translate.google.com/translate?hl=' + lang + '&sl=auto&tl=' + lang + '&u=' + window.location.href;
      window.location.href = url;
    }
  </script>
</head>
<body class="bg-share">
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-brand" target="_blank" rel="noopener noreferrer">🍳 CookSmart</a>
      <ul class="navbar-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="discover.html" onclick="return LoginModal.requireLogin(event)">Discover</a></li>
        <li><a href="trending.html" onclick="return LoginModal.requireLogin(event)">Trending</a></li>
        <li><a href="about.html" onclick="return LoginModal.requireLogin(event)">About</a></li>
      </ul>
    </div>
  </nav>

  <!-- Custom Floating Language Selector -->
  <button class="floating-lang-btn" onclick="toggleLangPopup()">🌐</button>
  <div id="lang-popup" class="lang-popup" style="display: none;">
    <button onclick="setLanguage('en')">English</button>
    <button onclick="setLanguage('hi')">हिंदी</button>
    <button onclick="setLanguage('mr')">मराठी</button>
  </div>
</body>
</html>
